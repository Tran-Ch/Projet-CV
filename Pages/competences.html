<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portfolio">
    <title>Portfolio</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>

    <!-- ✅ Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    


    <!-- ✅ Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</head>
<body>

    <!-- ✅ NAVBAR DÙNG BOOTSTRAP + GIỮ NGUYÊN HIỆU ỨNG + LOGO -->
    <nav class="navbar navbar-expand-lg top-nav">
        <div class="container-fluid">

            <!-- ✅ Logo SVG giữ nguyên -->
            <div class="nav-logos">
                <div class="logo-container-left">
                    <svg class="logo-left" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 450" role="presentation">
                        <defs>
                            <linearGradient id="hero-logo-left-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" stop-color="#5CC6FF" />
                                <stop offset="100%" stop-color="#C07BFF" />
                            </linearGradient>
                        </defs>
                        <path d="M180 425
                                C93 420, 82 349, 123 265
                                L226 66
                                C240 40, 260 40, 280 40
                                L380 40
                                C420 40, 430 70, 420 100
                                L400 140
                                M180 425
                                H308"
                            fill="none"
                            stroke="url(#hero-logo-left-gradient)"
                            stroke-width="35"
                            stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                </div>

                <div class="logo-container-right">
                    <svg class="logo-right" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 450" role="presentation">
                        <defs>
                            <linearGradient id="hero-logo-right-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" stop-color="#5CC6FF" />
                                <stop offset="100%" stop-color="#C07BFF" />
                            </linearGradient>
                        </defs>
                        <path d="M60 80 
                                H178 
                                Q312 80 270 209 
                                L120 580"
                            fill="none"
                            stroke="url(#hero-logo-right-gradient)"
                            stroke-width="35"
                            stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                </div>
            </div>

            <!-- ✅ Toggle mobile -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- ✅ Menu Bootstrap -->
            <div class="collapse navbar-collapse justify-content-center" id="mainNav">
                <ul class="navbar-nav gap-2">

                    <li class="nav-item">
                        <a class="nav-bordered" href="#">ACCUEIL</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-bordered" href="#">COMPÉTENCES</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-bordered" href="#">FORMATION</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-bordered" href="#">PORTFOLIO</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-bordered" href="#">CONTACT</a>
                    </li>

                </ul>
            </div>

        </div>
    </nav>

    <div class="background">
        <canvas id="starfield"></canvas>
        <div class="bg-gradient bg-gradient--one" style="--parallax-depth: 0.45;"></div>
        <div class="bg-gradient bg-gradient--two" style="--parallax-depth: -0.25;"></div>
        <div class="bg-gradient bg-gradient--three" style="--parallax-depth: 0.15;"></div>
        <div class="bg-rings" aria-hidden="true">
            <div class="ring ring--one"></div>
            <div class="ring ring--two"></div>
            <div class="ring ring--three"></div>
        </div>
        <div class="grain"></div>
    </div>

    <main class="hero">
        <header class="hero__content">

            <!-- ✅ Capsule Button Animation (GIỮ NGUYÊN) -->
            <div class="capsule-demo" aria-hidden="true">
                <svg class="capsule-svg" viewBox="0 0 200 340" role="img" aria-label="Animated capsule with inner path">
                    <path id="capsule" class="capsule"
                          d="M 100,10
                             A 70,70 0 0 1 170,80
                             L 170,260
                             A 70,70 0 0 1 100,330
                             A 70,70 0 0 1 30,260
                             L 30,80
                             A 70,70 0 0 1 100,10
                             Z" />
                    <path id="inner" class="inner" transform="translate(-14,0)"
                          d="M 77 20
                             C 157 40 137 70 97 110
                             C 114 113 120 111 113 137
                             C 105 160 104 224 105 280" />
                    <g id="downArrow" class="arrow">
                        <line x1="100" y1="222" x2="100" y2="282" />
                        <line x1="80"  y1="266" x2="100" y2="286" />
                        <line x1="120" y1="266" x2="100" y2="286" />
                    </g>
                </svg>
            </div>

        </header>
    </main>

</body>
</html>
