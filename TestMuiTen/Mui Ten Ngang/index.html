<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Capsule Button Animation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap">
    <svg viewBox="0 0 200 340">
      <!-- Vòng trắng -->
      <path id="capsule" class="capsule"
        d="M 100,10 A 70,70 0 0 1 170,80 L 170,260 A 70,70 0 0 1 100,330 A 70,70 0 0 1 30,260 L 30,80 A 70,70 0 0 1 100,10 Z" />

      <!-- Đường xanh (dịch trái như bạn đang dùng) -->
      <path id="inner" class="inner" transform="translate(-14,0)"
        d="M 77 20 
           C 157 40 137 70 97 110 
           C 114 113 120 111 113 137 
           C 105 160 104 224 105 280" />

      <!-- Mũi tên chevron ↓ (3 nét) -->
      <g id="downArrow" class="arrow">
        <line x1="100" y1="242" x2="100" y2="282" />
        <line x1="80"  y1="266" x2="100" y2="286" />
        <line x1="120" y1="266" x2="100" y2="286" />
      </g>
    </svg>
  </div>

  <script src="main.js" defer></script>
</body>
</html>
