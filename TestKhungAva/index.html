<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avatar Neon Gradient</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #030513;
    }

    /* Khung avatar neon */
    .avatar-frame {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      padding: 5px;
      background: conic-gradient(from 0deg, #5CC6FF, #C07BFF, #5CC6FF);
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 0 15px #5CC6FF, 0 0 30px #C07BFF;
      transition: box-shadow 0.3s ease, transform 0.3s ease;
    }

    .avatar-frame:hover {
      box-shadow: 0 0 25px #5CC6FF, 0 0 50px #C07BFF;
      transform: scale(1.05);
    }

    .avatar-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      clip-path: circle(50%);
    }

    /* Tạo gradient động */
    @keyframes rotateGradient {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .avatar-frame::before {
      content: '';
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, #5CC6FF, #C07BFF, #5CC6FF);
      animation: rotateGradient 5s linear infinite;
      filter: blur(10px);
      z-index: -1;
    }

  </style>
</head>
<body>

  <div class="avatar-frame position-relative">
    <img src="avatar.jpg" alt="Avatar">
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
