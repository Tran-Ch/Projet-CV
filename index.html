<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portfolio của Chuong Tran - Web Application Developer">
    <title>Chuong Tran · Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="signature" aria-hidden="true">
        <span class="signature__line">
            <span class="signature__segment signature__segment--left">
                <span class="signature__bracket">&lt;</span>
                <span class="signature__name">ChuongTran</span>
            </span>
            <span class="signature__middle signature__reload-all" role="button" tabindex="0" aria-label="Reload page">
                <span class="signature__attr"> onClick</span>
                <span class="signature__equals">=</span>
                <span class="signature__brace">{</span>
                <span class="signature__handler">reload</span>
                <span class="signature__brace">}</span>
            </span>
            <span class="signature__segment signature__segment--right">
                <span class="signature__slash">/</span>
                <span class="signature__bracket">&gt;</span>
            </span>
        </span>
    </div>

    <div class="background">
        <canvas id="starfield"></canvas>
        <div class="bg-gradient bg-gradient--one" style="--parallax-depth: 0.45;"></div>
        <div class="bg-gradient bg-gradient--two" style="--parallax-depth: -0.25;"></div>
        <div class="bg-gradient bg-gradient--three" style="--parallax-depth: 0.15;"></div>
        <div class="bg-rings" aria-hidden="true">
            <div class="ring ring--one"></div>
            <div class="ring ring--two"></div>
            <div class="ring ring--three"></div>
        </div>
        <div class="grain"></div>
    </div>

    <main class="hero">
        <header class="hero__content">
            <!-- Hai logo cùng hàng và chồng giữa -->
            <div class="hero__logos">
                <div class="hero__logo">
                    <div class="logo-container-left">
                        <svg class="logo-left" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 450" role="presentation">
                            <defs>
                                <linearGradient id="hero-logo-left-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                    <stop offset="0%" stop-color="#5CC6FF" />
                                    <stop offset="100%" stop-color="#C07BFF" />
                                </linearGradient>
                            </defs>
                            <path d="M180 425
                                     C93 420, 82 349, 123 265
                                     L226 66
                                     C240 40, 260 40, 280 40
                                     L380 40
                                     C420 40, 430 70, 420 100
                                     L400 140
                                     M180 425
                                     H308"
                                  fill="none"
                                  stroke="url(#hero-logo-left-gradient)"
                                  stroke-width="20"
                                  stroke-linecap="round"
                                  stroke-linejoin="round" />
                        </svg>
                    </div>
                </div>

                <div class="hero__logo">
                    <div class="logo-container-right">
                        <svg class="logo-right" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 450" role="presentation">
                            <defs>
                                <linearGradient id="hero-logo-right-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                    <stop offset="0%" stop-color="#5CC6FF" />
                                    <stop offset="100%" stop-color="#C07BFF" />
                                </linearGradient>
                            </defs>
                            <path d="M60 80 
                                     H178 
                                     Q312 80 270 209 
                                     L120 580"
                                  fill="none"
                                  stroke="url(#hero-logo-right-gradient)"
                                  stroke-width="20"
                                  stroke-linecap="round"
                                  stroke-linejoin="round" />
                        </svg>
                    </div>
                </div>

                <!-- CHỮ NẰM BÊN TRONG LOGO, XUẤT HIỆN SAU -->
                <div class="hero__text-inside">
                    <h1 class="hero__title">
                        <span class="hero__title-highlight">Chuong Tran</span>
                    </h1>
                    <p class="hero__lead">Web Application Developer Junior</p>
                </div>
            </div>

            <!-- BẮT ĐẦU: Capsule Button Animation -->
            <div class="capsule-demo" id="capsuleNav">
            <a href="../pages/apropos.html" class="capsule-link" aria-label="Aller à la page Compétences">
                <svg class="capsule-svg" viewBox="0 0 200 340" role="img" aria-label="Animated capsule with inner path">
                <!-- Vòng trắng -->
                <path id="capsule" class="capsule"
                    d="M 100,10
                        A 70,70 0 0 1 170,80
                        L 170,260
                        A 70,70 0 0 1 100,330
                        A 70,70 0 0 1 30,260
                        L 30,80
                        A 70,70 0 0 1 100,10
                        Z" />

                <!-- Đường xanh: giữ thông số, dịch nhẹ sang trái -->
                <path id="inner" class="inner" transform="translate(-14,0)"
                    d="M 77 20
                        C 157 40 137 70 97 110
                        C 114 113 120 111 113 137
                        C 105 160 104 224 105 280" />

                <!-- Mũi tên chevron (3 nét) -->
                <g id="downArrow" class="arrow">
                    <line x1="100" y1="242" x2="100" y2="282" />
                    <line x1="80"  y1="266" x2="100" y2="286" />
                    <line x1="120" y1="266" x2="100" y2="286" />
                </g>
                </svg>
            </a>
            </div>
            <!-- KẾT THÚC: Capsule Button Animation -->


        </header>

    </main>

    <script src="main.js" defer></script>
</body>
</html>
