<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Trình chỉnh sửa Tam giác bo tròn (điểm/cạnh/bo)</title>
<style>
  :root{
    --c1:#7cd7ff;--c2:#2ec5ff;--c3:#00b3ff;--bg:#edf3ff;
  }
  body{margin:0;background:#f6f8ff;font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;display:grid;place-items:center;min-height:100vh}
  .wrap{width:min(1100px,96vw);display:grid;gap:16px}
  .stage{background:transparent;filter:drop-shadow(0 20px 40px rgba(0,0,0,.08))}
  .panel{background:#fff;padding:14px;border-radius:14px;box-shadow:0 6px 18px rgba(0,0,0,.06);display:grid;gap:10px;grid-template-columns:repeat(6,1fr)}
  .panel h3{grid-column:1/-1;margin:0 0 4px;font-size:16px}
  label{font-size:12px;opacity:.75}
  input[type="range"]{width:100%}
  .btns{grid-column:1/-1;display:flex;gap:10px;justify-content:flex-end}
  button{padding:8px 12px;border-radius:10px;border:1px solid #e5e7eb;background:#fff;cursor:pointer}
  button:hover{background:#f3f4f6}
  textarea{grid-column:1/-1;width:100%;height:84px;font-family:ui-monospace,SFMono-Regular,Consolas,monospace}
  .handle{cursor:grab}
  .handle:active{cursor:grabbing}
  .tag{font-size:12px;fill:#334155}
</style>
</head>
<body>
<div class="wrap">
  <!-- Vùng vẽ -->
  <svg id="art" class="stage" viewBox="0 0 1000 920" width="100%" height="auto" aria-label="Rounded Triangle">
    <defs>
      <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="var(--c1)"/><stop offset="50%" stop-color="var(--c2)"/><stop offset="100%" stop-color="var(--c3)"/>
      </linearGradient>
      <linearGradient id="g2" x1="1" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="var(--c3)"/><stop offset="50%" stop-color="var(--c2)"/><stop offset="100%" stop-color="var(--c1)"/>
      </linearGradient>
      <!-- mask đan xen nhẹ -->
      <mask id="weave">
        <rect width="100%" height="100%" fill="white"/>
        <path d="M 860 480 C 820 640, 700 760, 520 810" fill="none" stroke="black" stroke-width="80" stroke-linecap="round"/>
        <path d="M 220 220 C 160 310, 130 360, 115 440" fill="none" stroke="black" stroke-width="80" stroke-linecap="round"/>
      </mask>
    </defs>

    <!-- nền trong -->
    <path id="clipBase" fill="var(--bg)"></path>

    <!-- 3 vòng đồng tâm theo đường bao bo tròn -->
    <g fill="none" stroke-linecap="round">
      <path id="outer" stroke="url(#g1)" stroke-width="36"></path>
      <path id="mid"   stroke="url(#g2)" stroke-width="22" mask="url(#weave)"></path>
      <path id="inner" stroke="url(#g1)" stroke-width="10"></path>
    </g>

    <!-- Handles kéo đỉnh -->
    <g id="handles" fill="#fff" stroke="#0ea5e9" stroke-width="3">
      <circle id="hA" class="handle" r="12"></circle>
      <circle id="hB" class="handle" r="12"></circle>
      <circle id="hC" class="handle" r="12"></circle>
      <text id="tA" class="tag">A</text>
      <text id="tB" class="tag">B</text>
      <text id="tC" class="tag">C</text>
    </g>
  </svg>

  <!-- Bảng điều khiển -->
  <div class="panel">
    <h3>Điểm & Bo góc</h3>

    <label>A.x</label><input id="ax" type="range" min="50" max="950" value="500" oninput="updFromUI()">
    <label>A.y</label><input id="ay" type="range" min="40" max="880" value="80"  oninput="updFromUI()">
    <label>rA</label><input id="ra" type="range" min="0"  max="240" value="90"  oninput="updFromUI()">

    <label>B.x</label><input id="bx" type="range" min="50" max="950" value="900" oninput="updFromUI()">
    <label>B.y</label><input id="by" type="range" min="40" max="880" value="460" oninput="updFromUI()">
    <label>rB</label><input id="rb" type="range" min="0"  max="240" value="120" oninput="updFromUI()">

    <label>C.x</label><input id="cx" type="range" min="50" max="950" value="130" oninput="updFromUI()">
    <label>C.y</label><input id="cy" type="range" min="40" max="880" value="480" oninput="updFromUI()">
    <label>rC</label><input id="rc" type="range" min="0"  max="240" value="110" oninput="updFromUI()">

    <h3 style="grid-column:1/-1;margin-top:8px">Độ dày vòng</h3>
    <label>Outer</label><input id="swO" type="range" min="6" max="64" value="36" oninput="updStroke()">
    <label>Mid</label><input id="swM" type="range" min="4" max="48" value="22" oninput="updStroke()">
    <label>Inner</label><input id="swI" type="range" min="2" max="28" value="10" oninput="updStroke()">

    <textarea id="pathText" readonly></textarea>
    <div class="btns">
      <button onclick="copyPath()">Copy path</button>
      <button onclick="copySVG()">Copy SVG</button>
    </div>
  </div>
</div>

<script>
  // ======= HÌNH HỌC GÓC BO CHUẨN =======
  const art = document.getElementById('art');
  const outer = document.getElementById('outer');
  const mid   = document.getElementById('mid');
  const inner = document.getElementById('inner');
  const clipBase = document.getElementById('clipBase');
  const pathText = document.getElementById('pathText');

  const sliders = {
    ax:document.getElementById('ax'), ay:document.getElementById('ay'), ra:document.getElementById('ra'),
    bx:document.getElementById('bx'), by:document.getElementById('by'), rb:document.getElementById('rb'),
    cx:document.getElementById('cx'), cy:document.getElementById('cy'), rc:document.getElementById('rc'),
    swO:document.getElementById('swO'), swM:document.getElementById('swM'), swI:document.getElementById('swI'),
  };

  function vec(a,b){ return {x:b.x-a.x, y:b.y-a.y}; }
  function len(v){ return Math.hypot(v.x, v.y); }
  function norm(v){ const l=len(v)||1; return {x:v.x/l, y:v.y/l}; }
  function dot(a,b){ return a.x*b.x + a.y*b.y; }
  function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }

  // tạo path bo tròn theo 3 đỉnh (CCW) và 3 bán kính r
  function roundedTrianglePath(A,B,C, rA,rB,rC){
    // xác định chiều (CCW): nếu ngược, đảo lại để arc sweep đúng
    const area = (B.x-A.x)*(C.y-A.y) - (B.y-A.y)*(C.x-A.x);
    let P = [A,B,C], R = [rA,rB,rC];
    let sweep = 1; // CCW
    if(area < 0){ P = [A,C,B]; R=[rA,rC,rB]; sweep = 0; } // đảo để thành CCW, đổi sweep

    // hàm lấy 2 điểm cắt trên 2 cạnh quanh đỉnh i
    function corner(i){
      const p = P[i], pP = P[(i+2)%3], pN = P[(i+1)%3];
      const vin = norm(vec(p, pP));   // hướng đi vào đỉnh (từ p đến prev)
      const vout= norm(vec(p, pN));   // hướng đi ra đỉnh (từ p đến next)
      // góc trong giữa hai cạnh:
      const cosTheta = clamp(-dot(vin, vout), -1, 1);
      const theta = Math.acos(cosTheta);
      // khoảng lùi t trên mỗi cạnh
      let t = R[i] / Math.tan(theta/2);
      // giới hạn t theo chiều dài 2 cạnh
      const eIn  = len(vec(pP,p));
      const eOut = len(vec(p,pN));
      t = Math.min(t, eIn*0.49, eOut*0.49);
      // điểm bắt đầu & kết thúc cung
      const s = {x: p.x + vin.x * t, y: p.y + vin.y * t}; // trên cạnh (prev->p)
      const e = {x: p.x + vout.x * t, y: p.y + vout.y * t}; // trên cạnh (p->next)
      return {s,e,r:R[i]};
    }

    const c0 = corner(0), c1 = corner(1), c2 = corner(2);

    // đường thẳng nối các điểm cắt theo chu vi
    const seg = (p1,p2)=>`L ${p2.x.toFixed(2)} ${p2.y.toFixed(2)}`;
    const arc = (r,p)=>`A ${p.r.toFixed(2)} ${p.r.toFixed(2)} 0 0 ${sweep} ${p.e.x.toFixed(2)} ${p.e.y.toFixed(2)}`;

    let d = `M ${c0.e.x.toFixed(2)} ${c0.e.y.toFixed(2)} `;
    d += seg(c0.e, c1.s) + ' ' + arc(0,c1) + ' ';
    d += seg(c1.e, c2.s) + ' ' + arc(0,c2) + ' ';
    d += seg(c2.e, c0.s) + ' ' + arc(0,c0) + ' Z';
    return d;
  }

  // ======= CẬP NHẬT GIAO DIỆN =======
  function updFromUI(){
    const A = {x:+sliders.ax.value, y:+sliders.ay.value};
    const B = {x:+sliders.bx.value, y:+sliders.by.value};
    const C = {x:+sliders.cx.value, y:+sliders.cy.value};
    const rA = +sliders.ra.value, rB = +sliders.rb.value, rC = +sliders.rc.value;

    const d = roundedTrianglePath(A,B,C, rA,rB,rC);
    [outer, mid, inner, clipBase].forEach(p => p.setAttribute('d', d));
    pathText.value = d;

    // đặt handle & nhãn
    setHandle('A',A); setHandle('B',B); setHandle('C',C);
  }

  function updStroke(){
    outer.setAttribute('stroke-width', sliders.swO.value);
    mid  .setAttribute('stroke-width', sliders.swM.value);
    inner.setAttribute('stroke-width', sliders.swI.value);
  }

  function setHandle(id, p){
    const h = document.getElementById('h'+id);
    const t = document.getElementById('t'+id);
    h.setAttribute('cx', p.x); h.setAttribute('cy', p.y);
    t.setAttribute('x', p.x + 16); t.setAttribute('y', p.y - 16);
  }

  async function copyPath(){
    await navigator.clipboard.writeText(pathText.value);
    alert('Đã copy path (d)!');
  }
  async function copySVG(){
    const svg = document.getElementById('art').outerHTML.replace(/>\s+</g,'><');
    await navigator.clipboard.writeText(svg);
    alert('Đã copy toàn bộ SVG!');
  }

  // ======= KÉO THẢ 3 ĐỈNH =======
  const handles = ['A','B','C'];
  handles.forEach(id=>{
    const el = document.getElementById('h'+id);
    let drag=false;
    function move(evt){
      if(!drag) return;
      const pt = getSVGPoint(evt);
      sliders[id.toLowerCase()+'x'].value = clamp(pt.x, 50, 950);
      sliders[id.toLowerCase()+'y'].value = clamp(pt.y, 40, 880);
      updFromUI();
    }
    el.addEventListener('pointerdown', e=>{drag=true; el.setPointerCapture(e.pointerId);});
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', ()=>drag=false);
  });

  function getSVGPoint(evt){
    const pt = art.createSVGPoint();
    pt.x = evt.clientX; pt.y = evt.clientY;
    const m = art.getScreenCTM().inverse();
    return pt.matrixTransform(m);
  }

  // khởi tạo
  updFromUI(); updStroke();
</script>
</body>
</html>
