<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Front-end Layer Demo (draw-through + slide logo)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <style>
      :root{
        --line:#8b8f93;
        --circle:#6c757d;
        --text:#56606a;
        --sub:#6b747c;
      }
      body{
        background:#fafbfc;
        min-height:100vh;
        display:flex;
        align-items:center;
        justify-content:center;
        padding:40px 12px;
        color:var(--text);
        font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      }
      .fe-card{
        position:relative;
        width:260px;
        padding:24px 24px 84px 56px;
        background:#fff;
        border-radius:18px;
        box-shadow:0 10px 25px rgba(0,0,0,.06);
        overflow:visible;
      }
      .fe-title{ font-weight:700; letter-spacing:.2px; margin-bottom:.5rem; }
      .fe-list{ list-style:none; padding:0; margin:0; }
      .fe-list li{ font-size:14px; color:var(--sub); line-height:1.8; }

      /* ===== Line + corner (SVG) ===== */
      .fe-stroke{
        position:absolute;
        left:25px;   /* gốc toạ độ của SVG chính */
        top:6px;
        overflow:visible;
        pointer-events:none;
      }
      .fe-stroke path{
        stroke:var(--line);
        stroke-width:2.2;
        fill:none;
        stroke-linecap:round;
        stroke-linejoin:miter; /* góc vuông */
        stroke-dasharray:100;
        stroke-dashoffset:100;
        transition:stroke-dashoffset .6s ease;
      }
      /* Chấm tròn: ẩn ban đầu, chỉ hiện khi hover */
      .fe-stroke circle{
        fill:var(--line);
        opacity:0;                         /* ẨN BAN ĐẦU */
        transition:opacity .2s ease;       /* Hiệu ứng xuất hiện */
      }

      /* ===== Semicircle (SVG riêng) ===== */
      .fe-semi-svg{
        position:absolute;
        left:50px;
        top:151px;
        width:100px;
        height:50px;
        overflow:visible;
        pointer-events:none;
      }
      .fe-semi-svg path{
        stroke:var(--line);
        stroke-width:2.2;
        fill:none;
        stroke-linecap:round;
        stroke-dasharray:100;
        stroke-dashoffset:100;
        transition:stroke-dashoffset .6s ease .45s;
      }

      /* ===== Logo circle ===== */
      .fe-circle{
        position:absolute;
        left:18px;
        bottom:-26px;
        width:84px;
        height:84px;
        background:var(--circle);
        border-radius:50%;
        box-shadow:0 12px 20px rgba(0,0,0,.2);
        display:flex;
        align-items:center;
        justify-content:center;
        color:#fff;
        font-size:36px;
        z-index:2;
        transition:transform .55s ease; /* trượt khi hover */
        will-change: transform;
      }

      /* ===== Ghi chú/Chữ: Ẩn ban đầu, chỉ hiện sau khi toàn bộ line vẽ xong ===== */
      .fe-content{
        opacity:0;
        transform: translateY(6px);
        /* line .6s + semi .6s with .45s delay ≈ 1.05s -> thêm đệm => 1.2s */
        transition: opacity .45s ease 1.2s, transform .45s ease 1.2s;
      }

      /* ===== Hover effects ===== */
      .fe-circle:hover{
        transform:translateX(40px); /* vòng tròn trượt sang phải */
      }
      .fe-circle:hover ~ .fe-stroke path,
      .fe-circle:hover ~ .fe-semi-svg path{
        stroke-dashoffset:0;
      }
      /* Khi hover logo -> hiện chấm tròn */
      .fe-circle:hover ~ .fe-stroke circle{
        opacity:1;
      }
      /* Sau khi các đường chạy (với delay ở trên), chữ mới hiện */
      .fe-card:hover .fe-content{
        opacity:1;
        transform: translateY(0);
      }

      /* (Tuỳ chọn) Hover toàn card cũng hoạt động cho line & circle */
      .fe-card:hover .fe-stroke path{ stroke-dashoffset:0; }
      .fe-card:hover .fe-semi-svg path{ stroke-dashoffset:0; }
      .fe-card:hover .fe-circle{ transform:translateX(40px); }
      .fe-card:hover .fe-stroke circle{ opacity:1; }
    </style>
  </head>
  <body>
    <div class="fe-card">
      <svg class="fe-stroke" width="120" height="210" viewBox="0 0 120 210" aria-hidden="true">
        <circle cx="8" cy="6" r="5"></circle>
        <path pathLength="100" d="M 8 11 L 8 195 L 25 195"></path>
      </svg>

      <svg class="fe-semi-svg" width="100" height="50" viewBox="0 0 100 50" aria-hidden="true">
        <path pathLength="100" d="M 0 50 A 50 50 0 0 1 100 50"></path>
      </svg>

      <div class="fe-content">
        <h5 class="fe-title">Front-end Layer</h5>
        <ul class="fe-list">
          <li>CSS</li>
          <li>JavaScript</li>
          <li>JavaScript Frameworks</li>
        </ul>
      </div>

      <div class="fe-circle">
        <i class="bi bi-code-slash"></i>
      </div>
    </div>
  </body>
</html>
